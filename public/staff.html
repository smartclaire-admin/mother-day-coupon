<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>發券 — 招待專用</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f0eb;min-height:100vh;padding:24px 16px;}
h1{font-size:18px;font-weight:600;color:#333;margin-bottom:4px;}
.sub{font-size:13px;color:#999;margin-bottom:24px;}
.btn-gen{width:100%;padding:18px;background:#d4547a;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:600;cursor:pointer;letter-spacing:1px;}
.btn-gen:active{transform:scale(0.98);}
.btn-gen:disabled{background:#ccc;cursor:not-allowed;}
.qr-wrap{margin-top:24px;background:#fff;border-radius:16px;padding:24px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.qr-label{font-size:13px;color:#999;margin-bottom:8px;}
.qr-hint{font-size:15px;font-weight:600;color:#333;margin-bottom:16px;}
#qrcode{display:flex;justify-content:center;margin-bottom:16px;}
.code-num{font-size:14px;font-family:monospace;color:#d4547a;letter-spacing:2px;margin-bottom:16px;}
.btn-done{width:100%;padding:14px;background:#27500A;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;}
.btn-done:active{transform:scale(0.98);}
.stats{display:flex;gap:12px;margin-bottom:20px;}
.stat{flex:1;background:#fff;border-radius:12px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.stat-num{font-size:24px;font-weight:700;color:#d4547a;}
.stat-label{font-size:11px;color:#999;margin-top:2px;}
</style>
</head>
<body>
<h1>母親節兌換券</h1>
<div class="sub">招待專用 — 發給沒有拿到禮物的媽媽</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">已發出</div></div>
  <div class="stat"><div class="stat-num" id="s-used">0</div><div class="stat-label">已兌換</div></div>
</div>

<button class="btn-gen" id="btn-gen" onclick="generate()">產生兌換券 QR Code</button>

<div class="qr-wrap" id="qr-wrap" style="display:none;">
  <div class="qr-label">讓媽媽用手機掃描</div>
  <div class="qr-hint">對準螢幕掃描即可領取</div>
  <div id="qrcode"></div>
  <div class="code-num" id="code-num"></div>
  <button class="btn-done" onclick="reset()">媽媽已掃描，關閉</button>
</div>

<script>
const SUPABASE_URL = 'https://fzsusjxlzffqdidgegrx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eOL6FsGFg6d2-QG8rNAxyA_udpYKKHW';
const BASE_URL = location.origin;

function genCode() {
  const now = new Date();
  const y = now.getFullYear();
  const rand = Math.random().toString(36).substring(2,7).toUpperCase();
  return `MTH-${y}-${rand}`;
}

async function generate() {
  const btn = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.textContent = '產生中...';

  const code = genCode();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({code, used: false})
  });

  if (res.ok) {
    const url = `${BASE_URL}/?code=${code}`;
    document.getElementById('qr-wrap').style.display = 'block';
    document.getElementById('code-num').textContent = code;
    document.getElementById('qrcode').innerHTML = '';
    QRCode.toCanvas(document.createElement('canvas'), url, {width: 200, margin: 1}, function(err, canvas) {
      if (!err) document.getElementById('qrcode').appendChild(canvas);
    });
    loadStats();
  }

  btn.disabled = false;
  btn.textContent = '產生兌換券 QR Code';
}

function reset() {
  document.getElementById('qr-wrap').style.display = 'none';
  document.getElementById('qrcode').innerHTML = '';
}

async function loadStats() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons?select=used`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
  });
  const data = await res.json();
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-used').textContent = data.filter(d => d.used).length;
}

loadStats();
</script>
</body>
</html>
