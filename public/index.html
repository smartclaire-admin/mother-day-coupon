<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>母親節禮物兌換券</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f0eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:400px;}
.coupon-card{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.18);background:#fff;}
.coupon-img{width:100%;display:block;max-height:340px;object-fit:cover;object-position:top;}
.coupon-bottom{background:#fff;padding:20px;text-align:center;border-top:2px dashed #f4a0b0;}
.coupon-num-label{font-size:12px;color:#999;margin-bottom:4px;letter-spacing:1px;}
.coupon-num{font-size:18px;font-weight:700;color:#d4547a;letter-spacing:2px;margin-bottom:16px;font-family:monospace;}
#qrcode{display:flex;justify-content:center;margin-bottom:12px;}
#qrcode canvas{border-radius:8px;}
.hint{font-size:12px;color:#aaa;line-height:1.6;}
.loading{text-align:center;padding:60px 20px;color:#999;font-size:15px;}
.error{text-align:center;padding:60px 20px;color:#e24b4a;font-size:15px;line-height:1.8;}
.used-banner{background:#e24b4a;color:#fff;text-align:center;padding:14px;font-size:15px;font-weight:500;}
.valid-banner{background:#27500A;color:#fff;text-align:center;padding:10px;font-size:13px;}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="loading">載入中...</div></div>
</div>
<script>
const SUPABASE_URL = 'https://fzsusjxlzffqdidgegrx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eOL6FsGFg6d2-QG8rNAxyA_udpYKKHW';

async function fetchCoupon(code) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons?code=eq.${code}&select=*`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
  });
  const data = await res.json();
  return data[0] || null;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const app = document.getElementById('app');

  if (!code) {
    app.innerHTML = '<div class="error">無效的連結<br><small>請重新掃描 QR Code</small></div>';
    return;
  }

  const coupon = await fetchCoupon(code);
  if (!coupon) {
    app.innerHTML = '<div class="error">找不到此兌換券<br><small>券號：' + code + '</small></div>';
    return;
  }

  const pageUrl = location.href;

  app.innerHTML = `
    <div class="coupon-card">
      ${coupon.used ? '<div class="used-banner">此券已兌換，無法再次使用</div>' : '<div class="valid-banner">有效兌換券，請於下週主日出示給招待</div>'}
      <img class="coupon-img" src="/coupon-bg.jpg" alt="母親節禮物兌換券"/>
      <div class="coupon-bottom">
        <div class="coupon-num-label">券號</div>
        <div class="coupon-num">${code}</div>
        <div id="qrcode"></div>
        <div class="hint">${coupon.used ? '此券已於 ' + new Date(coupon.used_at).toLocaleString('zh-TW') + ' 完成兌換' : '截圖保存此頁面\n下週主日出示給招待掃描'}</div>
      </div>
    </div>
  `;

  if (!coupon.used) {
    QRCode.toCanvas(document.createElement('canvas'), pageUrl, {width: 160, margin: 1}, function(err, canvas) {
      if (!err) document.getElementById('qrcode').appendChild(canvas);
    });
  }
}

init();
</script>
</body>
</html>
