<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>核銷 — 招待專用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f5f0eb;min-height:100vh;padding:24px 16px;}
h1{font-size:18px;font-weight:600;color:#333;margin-bottom:4px;}
.sub{font-size:13px;color:#999;margin-bottom:20px;}
.btn{width:100%;padding:16px;background:#d4547a;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:16px;}
.btn:active{transform:scale(0.98);}
.btn:disabled{background:#ccc;cursor:not-allowed;}
#reader{width:100%;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.result{border-radius:14px;padding:20px;margin-bottom:16px;text-align:center;}
.result.valid{background:#EAF3DE;}
.result.used{background:#FCEBEB;}
.result.notfound{background:#F1EFE8;}
.result-title{font-size:17px;font-weight:600;margin-bottom:6px;}
.result.valid .result-title{color:#27500A;}
.result.used .result-title{color:#A32D2D;}
.result.notfound .result-title{color:#5F5E5A;}
.result-code{font-size:13px;font-family:monospace;color:#888;margin-bottom:16px;}
.btn-redeem{width:100%;padding:16px;background:#27500A;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;}
.btn-redeem:active{transform:scale(0.98);}
.btn-reset{width:100%;padding:14px;background:transparent;color:#999;border:1.5px solid #ddd;border-radius:12px;font-size:14px;cursor:pointer;margin-top:10px;}
.log-section{margin-top:24px;}
.log-title{font-size:13px;font-weight:500;color:#999;margin-bottom:10px;letter-spacing:1px;}
.log-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.log-code{font-family:monospace;color:#d4547a;}
.log-time{color:#bbb;font-size:11px;}
.manual-row{display:flex;gap:8px;margin-bottom:16px;}
.manual-row input{flex:1;padding:14px;border:1.5px solid #ddd;border-radius:12px;font-size:15px;background:#fff;}
.manual-row input:focus{outline:none;border-color:#d4547a;}
.manual-row .btn-s{padding:14px 18px;background:#d4547a;color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;}
.divider{text-align:center;color:#ccc;font-size:13px;margin:12px 0;}
</style>
</head>
<body>
<h1>兌換券核銷</h1>
<div class="sub">招待專用 — 掃描或輸入券號完成核銷</div>

<button class="btn" id="btn-scan" onclick="startScan()">開啟相機掃描 QR Code</button>
<div id="reader" style="display:none;"></div>

<div class="divider">或手動輸入</div>
<div class="manual-row">
  <input type="text" id="code-input" placeholder="MTH-2026-XXXXX" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')checkCode(this.value)"/>
  <button class="btn-s" onclick="checkCode(document.getElementById('code-input').value)">查詢</button>
</div>

<div id="result"></div>

<div class="log-section">
  <div class="log-title">今日核銷紀錄</div>
  <div id="log-list"></div>
</div>

<script>
const SUPABASE_URL = 'https://fzsusjxlzffqdidgegrx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eOL6FsGFg6d2-QG8rNAxyA_udpYKKHW';
let scanner = null;
let currentCoupon = null;
let scanning = false;

function startScan() {
  if (scanning) { stopScan(); return; }
  document.getElementById('reader').style.display = 'block';
  document.getElementById('btn-scan').textContent = '關閉相機';
  scanning = true;
  scanner = new Html5Qrcode('reader');
  scanner.start(
    {facingMode: 'environment'},
    {fps: 10, qrbox: {width: 250, height: 250}},
    (text) => {
      stopScan();
      const url = new URL(text);
      const code = url.searchParams.get('code');
      if (code) checkCode(code);
      else showResult('notfound', '無法識別', text, null);
    },
    () => {}
  ).catch(() => {
    showResult('notfound', '無法開啟相機', '請允許相機權限或改用手動輸入', null);
    stopScan();
  });
}

function stopScan() {
  if (scanner) scanner.stop().catch(()=>{});
  document.getElementById('reader').style.display = 'none';
  document.getElementById('btn-scan').textContent = '開啟相機掃描 QR Code';
  scanning = false;
}

async function checkCode(code) {
  code = code.trim();
  if (!code) return;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons?code=eq.${code}&select=*`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
  });
  const data = await res.json();
  const coupon = data[0];
  if (!coupon) { showResult('notfound', '找不到此券號', code, null); return; }
  currentCoupon = coupon;
  if (coupon.used) {
    showResult('used', '此券已兌換', code, `已於 ${new Date(coupon.used_at).toLocaleString('zh-TW')} 使用`);
  } else {
    showResult('valid', '有效兌換券', code, null);
  }
}

function showResult(type, title, code, extra) {
  const result = document.getElementById('result');
  const extraHtml = extra ? `<div style="font-size:13px;margin-bottom:12px;">${extra}</div>` : '';
  const actionHtml = type === 'valid'
    ? `<button class="btn-redeem" onclick="redeemCoupon()">確認核銷，發出禮物</button>`
    : '';
  result.innerHTML = `<div class="result ${type}"><div class="result-title">${title}</div><div class="result-code">${code}</div>${extraHtml}${actionHtml}</div><button class="btn-reset" onclick="reset()">${type==='valid'?'取消':'重新掃描'}</button>`;
}

async function redeemCoupon() {
  if (!currentCoupon) return;
  const code = currentCoupon.code;
  const now = new Date().toISOString();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons?code=eq.${code}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({used: true, used_at: now})
  });
  if (res.ok) {
    showResult('valid', '核銷完成！', code, '此券已作廢，無法再次使用');
    document.querySelector('.btn-reset').textContent = '繼續核銷下一張';
    loadLog();
  }
}

function reset() {
  document.getElementById('code-input').value = '';
  document.getElementById('result').innerHTML = '';
  currentCoupon = null;
}

async function loadLog() {
  const today = new Date().toISOString().split('T')[0];
  const res = await fetch(`${SUPABASE_URL}/rest/v1/coupons?used=eq.true&used_at=gte.${today}T00:00:00&order=used_at.desc&select=code,used_at`, {
    headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
  });
  const data = await res.json();
  const list = document.getElementById('log-list');
  if (!data.length) { list.innerHTML = '<div style="font-size:13px;color:#bbb;text-align:center;padding:16px;">暫無紀錄</div>'; return; }
  list.innerHTML = data.map(d => `<div class="log-item"><span class="log-code">${d.code}</span><span class="log-time">${new Date(d.used_at).toLocaleTimeString('zh-TW')}</span></div>`).join('');
}

loadLog();
</script>
</body>
</html>
